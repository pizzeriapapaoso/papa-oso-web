const playBeep = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = f; o.type = "sine";
      g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.13);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.13 + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.13);
      o.stop(ctx.currentTime + i * 0.13 + 0.3);
    });
  } catch {}
};

  .admin-tab {
    background: rgba(255,255,255,0.1); border: none; color: #ccc;

// ─── COMPONENTE PRINCIPAL ─────────────────────────────────────────
function PapaOso() {
  const [pagina, setPagina] = useState("inicio");
  const [catActiva, setCatActiva] = useState("Pizzas");
  const [menu, setMenu] = useState(MENU_INICIAL);
  const [promos, setPromos] = useState(PROMOS_INICIALES);
  const [carrito, setCarrito] = useState([]);
  const [carritoAbierto, setCarritoAbierto] = useState(false);
  const [nota, setNota] = useState("");
  const [distancia, setDistancia] = useState("");
  const [adminMode, setAdminMode] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [loginPass, setLoginPass] = useState("");
  const [loginError, setLoginError] = useState("");
  const [toast, setToast] = useState({ msg: "", visible: false });
  const [adminTab, setAdminTab] = useState("menu");
  const [categorias, setCategorias] = useState(CATEGORIAS);
  const [nuevaCat, setNuevaCat] = useState("");
  const [deliveryZonas, setDeliveryZonas] = useState([
    { label: "0 – 1.500 m",       costo: 7000  },
    { label: "1.501 – 2.000 m",   costo: 8000  },
    { label: "2.001 – 3.000 m",   costo: 10000 },
    { label: "3.001 – 4.000 m",   costo: 13000 },
    { label: "4.001 – 5.000 m",   costo: 15000 },
    { label: "Más de 5.000 m",    costo: 20000 },
  ]);
  // Form nuevo item
  const [nuevoItem, setNuevoItem] = useState({ nombre: "", desc: "", precio: "", categoria: "Pizzas" });
  const [nuevaPromo, setNuevaPromo] = useState({ titulo: "", desc: "", precio: "" });
  const [fotos, setFotos] = useState({});
  const fileInputRef = useRef(null);
  const fotoItemRef = useRef(null);

  const mostrarToast = (msg) => {
    setToast({ msg, visible: true });
    setTimeout(() => setToast(t => ({ ...t, visible: false })), 2500);
  };

  // ── CARRITO ──
  const agregarItem = (item) => {
    setCarrito(prev => {
      const ex = prev.find(x => x.id === item.id);
      if (ex) return prev.map(x => x.id === item.id ? { ...x, qty: x.qty + 1 } : x);
      return [...prev, { ...item, qty: 1 }];
    });
    mostrarToast(`✅ ${item.nombre} agregado`);
    playBeep();
  };
  const cambiarQty = (id, delta) => {
    setCarrito(prev => {
      const updated = prev.map(x => x.id === id ? { ...x, qty: x.qty + delta } : x)
        .filter(x => x.qty > 0);
      return updated;
    });
  };
  const totalCarrito = carrito.reduce((acc, x) => acc + x.precio * x.qty, 0);
  const cantCarrito = carrito.reduce((acc, x) => acc + x.qty, 0);

  const pedirPorWhatsApp = () => {
    if (!carrito.length) return;
    const lineas = carrito.map(x => `• ${x.qty}x ${x.nombre} — ${gs(x.precio * x.qty)}`).join("\n");
    const msg = `🐻 *Pedido - ${NOMBRE_LOCAL}*\n\n${lineas}\n\n*Total: ${gs(totalCarrito)}*${nota ? `\n📝 Nota: ${nota}` : ""}\n\n_Limpio, Paraguay_`;
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
  };

  // ── DELIVERY ──
  const calcDelivery = () => {
    const metros = parseFloat(distancia);
    if (!metros || metros <= 0) return null;
    const limites = [1500, 2000, 3000, 4000, 5000];
    for (let i = 0; i < limites.length; i++) {
      if (metros <= limites[i]) return { costo: deliveryZonas[i].costo, texto: `🛵 ${gs(deliveryZonas[i].costo)} de envío` };
    }
    return { costo: deliveryZonas[5].costo, texto: `🛵 ${gs(deliveryZonas[5].costo)} de envío` };
  };
  const delivery = calcDelivery();

  // ── ADMIN ──
  const intentarLogin = () => {
    if (loginPass === ADMIN_PASS) {
      setAdminMode(true); setShowLogin(false); setLoginPass(""); setLoginError("");
      setPagina("admin");
    } else {
      setLoginError("Contraseña incorrecta");
    }
  };
  const agregarProducto = () => {
    if (!nuevoItem.nombre || !nuevoItem.precio) return;
    const id = Date.now();
    setMenu(prev => [...prev, { ...nuevoItem, id, precio: Number(nuevoItem.precio), activo: true, emoji: nuevoItem.categoria === "Pizzas" ? "🍕" : nuevoItem.categoria === "Lomitos" ? "🥖" : "🥤" }]);
    setNuevoItem({ nombre: "", desc: "", precio: "", categoria: "Pizzas" });
    mostrarToast("✅ Producto agregado");
  };
  const agregarPromo = () => {
    if (!nuevaPromo.titulo || !nuevaPromo.precio) return;
    setPromos(prev => [...prev, { ...nuevaPromo, id: Date.now(), activa: true, precio: Number(nuevaPromo.precio) }]);
    setNuevaPromo({ titulo: "", desc: "", precio: "" });
    mostrarToast("✅ Promo agregada");
  };
  const handleFoto = (id, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setFotos(prev => ({ ...prev, [id]: ev.target.result }));
    reader.readAsDataURL(file);
  };

  const menuFiltrado = menu.filter(x => x.categoria === catActiva && x.activo);

  return (
    <>
      <style>{estilos}</style>
      <div className={`app ${adminMode ? "admin-mode" : ""}`}>

        {/* ADMIN BAR */}
        {adminMode && (
          <div className="admin-bar">
            🔧 Modo Administrador activo — <span>Papa Oso Admin</span>
            <button className="btn-admin-out" onClick={() => { setAdminMode(false); setPagina("inicio"); }}>
              Salir
            </button>
          </div>
        )}

        {/* NAV */}
        <nav>
          <div className="nav-logo">
            <img src={LOGO} alt="Papa Oso" style={{ height: "42px", width: "42px", objectFit: "contain", borderRadius: "50%" }} />
            Papa Oso
          </div>
          <div className="nav-links">
            <button className={`nav-btn ${pagina === "inicio" ? "activo" : ""}`} onClick={() => setPagina("inicio")}>Inicio</button>
            <button className={`nav-btn ${pagina === "menu" ? "activo" : ""}`} onClick={() => setPagina("menu")}>Menú</button>
            <button className={`nav-btn ${pagina === "promos" ? "activo" : ""}`} onClick={() => setPagina("promos")}>🔥 Promos</button>
            <button className={`nav-btn ${pagina === "delivery" ? "activo" : ""}`} onClick={() => setPagina("delivery")}>Delivery</button>
            {adminMode
              ? <button className={`nav-btn ${pagina === "admin" ? "activo" : ""}`} onClick={() => setPagina("admin")}>⚙️ Admin</button>
              : <button className="nav-btn" onClick={() => setShowLogin(true)}>🔒</button>
            }
            <button className="nav-carrito" onClick={() => setCarritoAbierto(true)}>
              🛒 {cantCarrito > 0 && <span className="badge">{cantCarrito}</span>}
            </button>
          </div>
        </nav>

        {/* PÁGINA: INICIO */}
        {pagina === "inicio" && (
          <div className="hero">
            <img src={LOGO} alt="Papa Oso Logo" style={{ width: "160px", height: "160px", objectFit: "contain", marginBottom: "1rem", filter: "drop-shadow(0 8px 24px rgba(0,0,0,0.4))", animation: "flotar 3s ease-in-out infinite" }} />
            <h1>Pizzería y Lomitería<br /><span>Papa Oso</span></h1>
            <p className="hero-sub">Las mejores pizzas y lomitos de la zona</p>
            <p className="hero-ciudad">📍 {CIUDAD}</p>
            <div className="hero-btns">
              <button className="btn-hero-main" onClick={() => setPagina("menu")}>Ver el Menú 🍕</button>
              <button className="btn-hero-sec" onClick={() => setPagina("promos")}>Ver Promociones 🔥</button>
            </div>
          </div>
        )}

        {/* PÁGINA: MENÚ */}
        {pagina === "menu" && (
          <div className="seccion" style={{ paddingTop: "7rem" }}>
            <h2 className="seccion-titulo">🍕 Nuestro Menú</h2>
            <div className="divisor" />
            <p className="seccion-sub">Tocá "Agregar" para armar tu pedido</p>
            <div className="tabs">
              {categorias.map(c => (
                <button key={c} className={`tab ${catActiva === c ? "activo" : ""}`} onClick={() => setCatActiva(c)}>
                  {c === "Pizzas" ? "🍕" : c === "Borde Relleno" ? "🍕✨" : c === "Lomitos" ? "🥖" : c === "Hamburguesas" ? "🍔" : "🥤"} {c}
                </button>
              ))}
            </div>
            <div className="grid-menu">
              {menuFiltrado.map(item => (
                <div className="card-menu" key={item.id}>
                  <div className="card-foto">
                    {fotos[item.id] ? <img src={fotos[item.id]} alt={item.nombre} /> : item.emoji}
                    {adminMode && (
                      <>
                        <input type="file" accept="image/*" style={{ display: "none" }} id={`foto-${item.id}`} onChange={e => handleFoto(item.id, e)} />
                        <label className="card-foto-upload" htmlFor={`foto-${item.id}`}>📷 Foto</label>
                      </>
                    )}
                  </div>
                  <div className="card-body">
                    <div className="card-nombre">{item.nombre}</div>
                    <div className="card-desc">{item.desc}</div>
                    <div className="card-footer">
                      <span className="card-precio">{gs(item.precio)}</span>
                      <button className="btn-agregar" onClick={() => agregarItem(item)}>+ Agregar</button>
                    </div>
                  </div>
                </div>
              ))}
              {menuFiltrado.length === 0 && (
                <p style={{ color: "#aaa", gridColumn: "1/-1", textAlign: "center", padding: "2rem" }}>
                  No hay productos disponibles en esta categoría.
                </p>
              )}
            </div>
          </div>
        )}

        {/* PÁGINA: PROMOS */}
        {pagina === "promos" && (
          <div className="seccion" style={{ paddingTop: "7rem" }}>
            <h2 className="seccion-titulo">🔥 Promociones</h2>
            <div className="divisor" />
            <p className="seccion-sub">¡Combos especiales al mejor precio!</p>
            <div className="grid-promos">
              {promos.filter(p => p.activa).map(p => (
                <div className="card-promo" key={p.id}>
                  <div className="promo-titulo">{p.titulo}</div>
                  <div className="promo-desc">{p.desc}</div>
                  <div className="promo-precio">{gs(p.precio)}</div>
                  <button className="btn-promo" onClick={() => {
                    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`¡Hola! Quiero pedir la ${p.titulo} por ${gs(p.precio)} 🐻`)}`, "_blank");
                  }}>
                    Pedir por WhatsApp 💬
                  </button>
                </div>
              ))}
              {promos.filter(p => p.activa).length === 0 && (
                <p style={{ color: "#aaa", textAlign: "center", padding: "2rem" }}>No hay promociones activas por el momento.</p>
              )}
            </div>
          </div>
        )}

        {/* PÁGINA: DELIVERY */}
        {pagina === "delivery" && (
          <div className="seccion" style={{ paddingTop: "7rem" }}>
            <h2 className="seccion-titulo">🛵 Calculá tu Delivery</h2>
            <div className="divisor" />
            <p className="seccion-sub">Ingresá la distancia desde el local hasta tu casa</p>
            <div className="calc-box">
              <h3>¿Cuánto estás del local?</h3>
              <p>Podés calcularlo en Google Maps</p>
              <input
                className="calc-input"
                type="number"
                placeholder="Distancia en metros (ej: 1500)"
                value={distancia}
                onChange={e => setDistancia(e.target.value)}
              />
              {delivery && (
                <div className="calc-resultado">
                  {delivery.fuera
                    ? <span className="calc-costo">{delivery.texto}</span>
                    : delivery.gratis
                      ? <span className="calc-gratis">{delivery.texto}</span>
                      : <span className="calc-costo">🛵 {delivery.texto}</span>
                  }
                  {!delivery.fuera && (
                    <p style={{ fontSize: "0.85rem", color: "#888", marginTop: "0.5rem" }}>
                      {distancia / 1000 <= 1 ? "Hasta 1 km: gratis"
                        : distancia / 1000 <= 2 ? "De 1 a 2 km: Gs. 10.000"
                          : distancia / 1000 <= 4 ? "De 2 a 4 km: Gs. 15.000"
                            : "De 4 a 7 km: Gs. 20.000"}
                    </p>
                  )}
                </div>
              )}
              <div style={{ marginTop: "1.5rem", padding: "1rem", background: "#f8f8f8", borderRadius: "10px", fontSize: "0.85rem", color: "#666" }}>
                <strong>📍 Zonas de cobertura:</strong><br />
                {deliveryZonas.map((z,i) => <span key={i}>✅ {z.label} — {gs(z.costo)}<br /></span>)}
              </div>
            </div>
          </div>
        )}

        {/* PÁGINA: ADMIN */}
        {pagina === "admin" && adminMode && (
          <div className="admin-panel" style={{ paddingTop: "5rem" }}>
            <h2>⚙️ Panel de Administración</h2>
            <div className="admin-tabs">
              <button className={`admin-tab ${adminTab === "menu" ? "activo" : ""}`} onClick={() => setAdminTab("menu")}>📋 Menú</button>
              <button className={`admin-tab ${adminTab === "promos" ? "activo" : ""}`} onClick={() => setAdminTab("promos")}>🔥 Promos</button>
              <button className={`admin-tab ${adminTab === "config" ? "activo" : ""}`} onClick={() => setAdminTab("config")}>⚙️ Configuración</button>
            </div>

            {adminTab === "menu" && (
              <>
                <div className="admin-form">
                  <h3>➕ Agregar Producto</h3>
                  <div className="form-grid">
                    <input className="form-input" placeholder="Nombre del producto" value={nuevoItem.nombre} onChange={e => setNuevoItem(p => ({ ...p, nombre: e.target.value }))} />
                    <input className="form-input" placeholder="Precio en Gs." type="number" value={nuevoItem.precio} onChange={e => setNuevoItem(p => ({ ...p, precio: e.target.value }))} />
                    <input className="form-input" placeholder="Descripción" value={nuevoItem.desc} onChange={e => setNuevoItem(p => ({ ...p, desc: e.target.value }))} style={{ gridColumn: "1/-1" }} />
                    <select className="form-input" value={nuevoItem.categoria} onChange={e => setNuevoItem(p => ({ ...p, categoria: e.target.value }))}>
                      {categorias.map(c => <option key={c}>{c}</option>)}
                    </select>
                    <button className="btn-admin-add" onClick={agregarProducto}>Agregar ✅</button>
                  </div>
                </div>
                <div className="lista-admin">
                  {menu.map(item => (
                    <div className="item-admin" key={item.id}>
                      <div className="item-admin-info">
                        <div className="item-admin-nombre">{item.emoji} {item.nombre}</div>
                        <div className="item-admin-precio">{gs(item.precio)} — {item.categoria}</div>
                      </div>
                      <div className="item-admin-acciones">
                        <button className={`toggle-activo ${item.activo ? "on" : "off"}`}
                          onClick={() => setMenu(m => m.map(x => x.id === item.id ? { ...x, activo: !x.activo } : x))}>
                          {item.activo ? "✅ Activo" : "🚫 Inactivo"}
                        </button>
                        <button className="btn-eliminar" onClick={() => setMenu(m => m.filter(x => x.id !== item.id))}>Eliminar</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {adminTab === "config" && (
              <>
                <div className="admin-form">
                  <h3>🛵 Costos de Delivery por Zona</h3>
                  <p style={{color:"#aaa", fontSize:"0.85rem", marginBottom:"1rem"}}>Editá los costos según la distancia en metros</p>
                  {deliveryZonas.map((zona, i) => (
                    <div key={i} style={{display:"flex", gap:"1rem", alignItems:"center", marginBottom:"0.8rem", flexWrap:"wrap"}}>
                      <span style={{color:"#ccc", minWidth:"200px", fontSize:"0.9rem"}}>{zona.label}</span>
                      <input className="form-input" type="number" value={zona.costo}
                        style={{width:"150px"}}
                        onChange={e => setDeliveryZonas(prev => prev.map((z,j) => j===i ? {...z, costo: Number(e.target.value)} : z))}
                      />
                      <span style={{color:"#F4D03F", fontSize:"0.85rem"}}>Gs.</span>
                    </div>
                  ))}
                </div>
                <div className="admin-form">
                  <h3>📂 Categorías del Menú</h3>
                  <p style={{color:"#aaa", fontSize:"0.85rem", marginBottom:"1rem"}}>Agregá nuevas categorías</p>
                  <div style={{display:"flex", gap:"1rem", marginBottom:"1rem", flexWrap:"wrap"}}>
                    <input className="form-input" placeholder="Nueva categoría" value={nuevaCat}
                      onChange={e => setNuevaCat(e.target.value)} style={{flex:1}} />
                    <button className="btn-admin-add" onClick={() => {
                      if(nuevaCat.trim()) { setCategorias(prev => [...prev, nuevaCat.trim()]); setNuevaCat(""); mostrarToast("✅ Categoría agregada"); }
                    }}>Agregar ✅</button>
                  </div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:"0.5rem"}}>
                    {categorias.map((cat, i) => (
                      <div key={i} style={{background:"rgba(255,255,255,0.1)", padding:"0.4rem 1rem", borderRadius:"20px", display:"flex", alignItems:"center", gap:"0.5rem"}}>
                        <span style={{fontSize:"0.9rem"}}>{cat}</span>
                        {!["Pizzas","Borde Relleno","Lomitos","Hamburguesas","Bebidas"].includes(cat) && (
                          <button onClick={() => setCategorias(prev => prev.filter((_,j) => j!==i))}
                            style={{background:"none", border:"none", color:"#e74c3c", cursor:"pointer", fontSize:"1rem"}}>✕</button>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}

            {adminTab === "promos" && (
              <>
                <div className="admin-form">
                  <h3>➕ Agregar Promoción</h3>
                  <div className="form-grid">
                    <input className="form-input" placeholder="Título de la promo" value={nuevaPromo.titulo} onChange={e => setNuevaPromo(p => ({ ...p, titulo: e.target.value }))} />
                    <input className="form-input" placeholder="Precio en Gs." type="number" value={nuevaPromo.precio} onChange={e => setNuevaPromo(p => ({ ...p, precio: e.target.value }))} />
                    <input className="form-input" placeholder="Descripción" value={nuevaPromo.desc} onChange={e => setNuevaPromo(p => ({ ...p, desc: e.target.value }))} style={{ gridColumn: "1/-1" }} />
                    <button className="btn-admin-add" onClick={agregarPromo}>Agregar ✅</button>
                  </div>
                </div>
                <div className="lista-admin">
                  {promos.map(promo => (
                    <div className="item-admin" key={promo.id}>
                      <div className="item-admin-info">
                        <div className="item-admin-nombre">{promo.titulo}</div>
                        <div className="item-admin-precio">{gs(promo.precio)} — {promo.desc}</div>
                      </div>
                      <div className="item-admin-acciones">
                        <button className={`toggle-activo ${promo.activa ? "on" : "off"}`}
                          onClick={() => setPromos(p => p.map(x => x.id === promo.id ? { ...x, activa: !x.activa } : x))}>
                          {promo.activa ? "✅ Activa" : "🚫 Inactiva"}
                        </button>
                        <button className="btn-eliminar" onClick={() => setPromos(p => p.filter(x => x.id !== promo.id))}>Eliminar</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}

        {/* FOOTER */}
        {pagina !== "admin" && (
          <footer className="footer">
            <strong>🐻 {NOMBRE_LOCAL}</strong><br />
            📍 {CIUDAD}<br /><br />
            <a href={`https://wa.me/${WHATSAPP}`} target="_blank" rel="noreferrer">
              💬 Pedidos por WhatsApp
            </a>
          </footer>
        )}

        {/* CARRITO SIDEBAR */}
        <div className={`carrito-overlay ${carritoAbierto ? "abierto" : ""}`} onClick={() => setCarritoAbierto(false)} />
        <div className={`carrito-panel ${carritoAbierto ? "abierto" : ""}`}>
          <div className="carrito-header">
            🛒 Tu Pedido
            <button className="btn-cerrar" onClick={() => setCarritoAbierto(false)}>✕</button>
          </div>
          <div className="carrito-items">
            {carrito.length === 0
              ? <div className="carrito-vacio">Tu carrito está vacío.<br />¡Agregá algo del menú! 🍕</div>
              : carrito.map(item => (
                <div className="item-carrito" key={item.id}>
                  <span className="item-emoji">{item.emoji}</span>
                  <div className="item-info">
                    <div className="item-nombre">{item.nombre}</div>
                    <div className="item-precio">{gs(item.precio * item.qty)}</div>
                  </div>
                  <div className="item-controles">
                    <button className="btn-qty" onClick={() => cambiarQty(item.id, -1)}>−</button>
                    <span className="qty-num">{item.qty}</span>
                    <button className="btn-qty" onClick={() => cambiarQty(item.id, 1)}>+</button>
                  </div>
                </div>
              ))
            }
          </div>
          {carrito.length > 0 && (
            <div className="carrito-footer">
              <div className="carrito-total">
                <span>Total:</span>
                <span style={{ color: "var(--rojo)" }}>{gs(totalCarrito)}</span>
              </div>
              <textarea
                className="carrito-nota"
                placeholder="¿Alguna nota? (sin cebolla, extra queso...)"
                rows={2}
                value={nota}
                onChange={e => setNota(e.target.value)}
              />
              <button className="btn-whatsapp" onClick={pedirPorWhatsApp}>
                💬 Pedir por WhatsApp
              </button>
            </div>
          )}
        </div>

        {/* LOGIN MODAL */}
        {showLogin && (
          <div className="login-overlay">
            <div className="login-box">
              <h2>🔒 Admin</h2>
              <p>Ingresá la contraseña de administrador</p>
              <input
                className="login-input"
                type="password"
                placeholder="Contraseña"
                value={loginPass}
                onChange={e => setLoginPass(e.target.value)}
                onKeyDown={e => e.key === "Enter" && intentarLogin()}
              />
              {loginError && <p className="login-error">{loginError}</p>}
              <button className="btn-login" onClick={intentarLogin}>Entrar</button>
              <br />
              <button style={{ background: "none", border: "none", color: "#aaa", marginTop: "1rem", cursor: "pointer", fontSize: "0.85rem" }}
                onClick={() => { setShowLogin(false); setLoginError(""); setLoginPass(""); }}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* TOAST */}
        <div className={`toast ${toast.visible ? "visible" : ""}`}>{toast.msg}</div>

      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PapaOso />);
  </script>
</body>
</html>
